name: Publish to ClawHub

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.13.2)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install ClawHub CLI
        run: |
          npm install -g clawhub@latest
          clawhub --version

      - name: Build .skill package
        run: |
          # Remove old .skill file if exists
          rm -f anamnesis-hub.skill
          # Build new .skill (zip everything except .git and .skill itself)
          zip -r anamnesis-hub.skill . \
            -x ".git/*" \
            -x "anamnesis-hub.skill" \
            -x "__pycache__/*" \
            -x "*/__pycache__/*"
          echo "Built: $(ls -lh anamnesis-hub.skill)"

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          VERSION_NUM=${VERSION#v}
          echo "Publishing version: $VERSION_NUM"
          echo "Token length: ${#CLAWHUB_TOKEN}"
          clawhub publish . \
            --slug anamnesis-hub \
            --owner victorqr \
            --version "$VERSION_NUM" \
            --changelog "Release $VERSION_NUM"
